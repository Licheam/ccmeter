name: Build

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen create-dmg xcbeautify

      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (universal binary, ad-hoc signed)
        run: |
          xcodebuild \
            -project ccmeter.xcodeproj \
            -scheme ccmeter \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}

      - name: Verify universal binary
        run: |
          APP=build/Build/Products/Release/ccmeter.app
          file "$APP/Contents/MacOS/ccmeter"
          lipo -info "$APP/Contents/MacOS/ccmeter"

      - name: Create DMG
        run: |
          mkdir -p dist
          APP=build/Build/Products/Release/ccmeter.app
          DMG="dist/ccmeter-${{ steps.version.outputs.version }}.dmg"
          # create-dmg occasionally flakes on AppleScript timing in headless CI; retry once
          create-dmg \
            --volname "ccmeter ${{ steps.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 540 320 \
            --icon-size 96 \
            --icon "ccmeter.app" 140 150 \
            --hide-extension "ccmeter.app" \
            --app-drop-link 400 150 \
            --no-internet-enable \
            "$DMG" \
            "$APP" \
          || create-dmg \
            --volname "ccmeter ${{ steps.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 540 320 \
            --icon-size 96 \
            --icon "ccmeter.app" 140 150 \
            --hide-extension "ccmeter.app" \
            --app-drop-link 400 150 \
            --no-internet-enable \
            "$DMG" \
            "$APP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccmeter-${{ steps.version.outputs.version }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            Unsigned build. macOS Gatekeeper will block first launch.

            **First launch**: right-click `ccmeter.app` in Finder → **Open** → confirm.
            (Or: System Settings → Privacy & Security → "Open Anyway" after the first blocked attempt.)

            Subsequent launches work normally.
