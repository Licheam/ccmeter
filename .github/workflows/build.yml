name: Build

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen create-dmg xcbeautify

      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (universal binary, ad-hoc signed)
        run: |
          xcodebuild \
            -project ccmeter.xcodeproj \
            -scheme ccmeter \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || exit ${PIPESTATUS[0]}

      - name: Verify universal binary
        run: |
          APP=build/Build/Products/Release/ccmeter.app
          file "$APP/Contents/MacOS/ccmeter"
          lipo -info "$APP/Contents/MacOS/ccmeter"

      - name: Create DMG
        run: |
          mkdir -p dist
          APP=build/Build/Products/Release/ccmeter.app
          DMG="dist/ccmeter-${{ steps.version.outputs.version }}.dmg"
          # create-dmg occasionally flakes on AppleScript timing in headless CI; retry once
          create-dmg \
            --volname "ccmeter ${{ steps.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 540 320 \
            --icon-size 96 \
            --icon "ccmeter.app" 140 150 \
            --hide-extension "ccmeter.app" \
            --app-drop-link 400 150 \
            --no-internet-enable \
            "$DMG" \
            "$APP" \
          || create-dmg \
            --volname "ccmeter ${{ steps.version.outputs.version }}" \
            --window-pos 200 120 \
            --window-size 540 320 \
            --icon-size 96 \
            --icon "ccmeter.app" 140 150 \
            --hide-extension "ccmeter.app" \
            --app-drop-link 400 150 \
            --no-internet-enable \
            "$DMG" \
            "$APP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccmeter-${{ steps.version.outputs.version }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Download Sparkle tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -fsSL https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz \
            | tar -xJ -C /tmp/

      - name: Sign DMG and update appcast
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/ccmeter-${VERSION}.dmg"
          PRIV=/tmp/sparkle_priv.key
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$PRIV"
          SIG_LINE=$(/tmp/bin/sign_update -f "$PRIV" "$DMG")
          rm -f "$PRIV"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/ccmeter-${VERSION}.dmg"
          PUBDATE=$(LC_ALL=en_US.UTF-8 TZ=UTC date "+%a, %d %b %Y %H:%M:%S +0000")
          ITEM=$'    <item>\n      <title>ccmeter '"${VERSION}"$'</title>\n      <pubDate>'"${PUBDATE}"$'</pubDate>\n      <sparkle:version>'"${{ github.run_number }}"$'</sparkle:version>\n      <sparkle:shortVersionString>'"${VERSION}"$'</sparkle:shortVersionString>\n      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n      <enclosure url="'"${URL}"$'" type="application/octet-stream" '"${SIG_LINE}"$' />\n    </item>'
          export ITEM
          python3 -c "import os; d = open('appcast.xml').read(); open('appcast.xml','w').write(d.replace('</channel>', os.environ['ITEM'] + '\n  </channel>'))"
          echo "--- appcast.xml ---"
          cat appcast.xml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            Unsigned build. macOS Gatekeeper will block first launch.

            **First launch**: right-click `ccmeter.app` in Finder → **Open** → confirm.
            (Or: System Settings → Privacy & Security → "Open Anyway" after the first blocked attempt.)

            Subsequent launches work normally.

      - name: Commit updated appcast back to main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Save the freshly-updated appcast (we're on a detached HEAD at the tag)
          cp appcast.xml /tmp/appcast-new.xml
          # Move to a fresh local main pointing at the latest origin/main
          git fetch origin main
          git checkout -B main origin/main
          # Re-apply our update on top of latest main
          mv /tmp/appcast-new.xml appcast.xml
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast.xml changes to commit"
            exit 0
          fi
          git commit -m "Update appcast for v${{ steps.version.outputs.version }}"
          git push origin main
