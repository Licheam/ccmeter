name: ccmeter
options:
  bundleIdPrefix: wang.leachim
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: wang.leachim.ccmeter
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  ccmeter:
    type: application
    platform: macOS
    sources:
      - path: ccmeter
    dependencies:
      - package: Sparkle
    info:
      path: ccmeter/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "1"
        CFBundleDisplayName: "ccmeter"
        NSHumanReadableCopyright: "Copyright © 2026 Leachim. All rights reserved."
        SUFeedURL: "https://raw.githubusercontent.com/Licheam/ccmeter/main/appcast.xml"
        SUPublicEDKey: "WC55d7tfAtb81zppZIF1uECUz+87IJ+7TAQdQ/9ls+w="
        SUEnableInstallerLauncherService: false
